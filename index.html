<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pythonec2docker</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.3);
      color: #58a6ff;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 999px;
    }

    .badge::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #58a6ff;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #58a6ff55, transparent);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #1f2937, #0d1117);
      border: 1px solid #30363d;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .project-name {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e6edf3 30%, #58a6ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .description {
      font-size: 1rem;
      color: #8b949e;
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto 2rem;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #21262d;
      margin: 1.75rem 0;
    }

    .repo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .repo-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6e7681;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #21262d;
      border: 1px solid #30363d;
      color: #58a6ff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }

    .repo-link:hover {
      background: #2d333b;
      border-color: #58a6ff;
      transform: translateY(-1px);
    }

    .repo-link svg {
      flex-shrink: 0;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-top: 0.5rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 500;
    }

    footer {
      margin-top: 1rem;
      text-align: center;
      color: #6e7681;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
    }

    footer span {
      color: #58a6ff;
      font-weight: 600;
    }

    footer .heart {
      color: #f85149;
      display: inline-block;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.2); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      56% { transform: scale(1); }
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }
      .project-name {
        font-size: 1.7rem;
      }
      .stats-row {
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="badge">Open Source Project</div>

    <div class="card">
      <div class="icon-wrap">🐳</div>

      <h1 class="project-name">pythonec2docker</h1>

      <p class="description">
        A streamlined solution for deploying Python applications to AWS EC2 using Docker — containerize, ship, and run with confidence.
      </p>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-value">Python</span>
          <span class="stat-label">Language</span>
        </div>
        <div class="stat">
          <span class="stat-value">Docker</span>
          <span class="stat-label">Runtime</span>
        </div>
        <div class="stat">
          <span class="stat-value">AWS EC2</span>
          <span class="stat-label">Platform</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="repo-section">
        <span class="repo-label">Repository</span>
        <a class="repo-link" href="https://github.com/pythonec2docker" target="_blank" rel="noopener noreferrer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

          </svg>
          pythonec2docker
        </a>
      </div>
    </div>

    <footer>
      <span class="heart">♥</span> Developed by <span>Royal Bengal AI</span>
    </footer>

  </div>

</body>
</html>
